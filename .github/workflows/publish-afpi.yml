name: Publish auth0_flutter_platform_interface to pub.dev

on:
  push:
    tags:
      - 'afpi-v[0-9]+.[0-9]+.[0-9]+*'

permissions:
  contents: write
  id-token: write

env:
  flutter: '3.x'

jobs:
  rl-scanner:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # pin@v2.23.0
        with:
          flutter-version: '3.x'
          channel: stable
          cache: true

      - name: Build package
        shell: bash
        run: |
          zip -r auth0-flutter-afpi.zip ./*

      - name: Get version
        id: get_version
        run: |
          version=$(awk -F"'" '/const String version/ {print $2}' auth0_flutter/lib/src/version.dart)
          echo "version=$version" >> $GITHUB_OUTPUT

      - name: Run RL Scanner
        uses: auth0/devsecops-tooling/.github/actions/rl-scan@main
        with:
          artifact-name: "auth0-flutter-afpi"
          artifact-path: "${{ github.workspace }}/auth0-flutter-afpi.zip"
          version: ${{ steps.get_version.outputs.version }}
          RLSECURE_LICENSE: ${{ secrets.RLSECURE_LICENSE }}
          RLSECURE_SITE_KEY: ${{ secrets.RLSECURE_SITE_KEY }}
          SIGNAL_HANDLER_TOKEN: ${{ secrets.SIGNAL_HANDLER_TOKEN }}
          SIGNAL_HANDLER_DOMAIN: ${{ secrets.SIGNAL_HANDLER_DOMAIN }}
          PRODSEC_TOOLS_ARN: ${{ secrets.PRODSEC_TOOLS_ARN }}
          PRODSEC_TOOLS_USER: ${{ secrets.PRODSEC_TOOLS_USER }}
          PRODSEC_TOOLS_TOKEN: ${{ secrets.PRODSEC_TOOLS_TOKEN }}
          PRODSEC_PYTHON_TOOLS_REPO: ${{ secrets.PRODSEC_PYTHON_TOOLS_REPO }}

  publish:
    name: Publish auth0_flutter_platform_interface to pub.dev
    environment: ${{ github.event.pull_request.head.repo.fork && 'external' || 'internal' }}
    needs: rl-scanner
    runs-on: ubuntu-latest

    permissions:
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3

      - name: Setup Flutter and Dart SDK
        uses: ./.github/actions/setup-publish
        with:
          flutter: ${{ env.flutter }}
          working-directory: auth0_flutter_platform_interface

      - name: Publish
        run: dart pub publish -f
        working-directory: auth0_flutter_platform_interface
