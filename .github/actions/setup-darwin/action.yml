name: Set up iOS/macOS environment
description: Set up the environment for building and testing the library on iOS/macOS

inputs:
  platform:
    description: Either iOS or macOS
    required: true

  flutter:
    description: The version of Flutter to use
    required: true

  xcode:
    description: The version of Xcode to use
    required: true

  auth0-domain:
    description: The Auth0 domain
    required: true

  auth0-client-id:
    description: The Auth0 client ID
    required: true

runs:
  using: composite

  steps:
    - name: Lowercase platform value
      id: lowercase-platform
      run: echo "platform=$(echo ${{ inputs.platform }} | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
      shell: bash

    - name: Set up Ruby
      uses: ruby/setup-ruby@9eb537ca036ebaed86729dcb9309076e4c5c3b74 # pin@v1.314.0
      with:
        ruby-version: ${{ inputs.ruby }}
        bundler-cache: true
        cache-version: 1
        working-directory: auth0_flutter/example/${{ steps.lowercase-platform.outputs.platform }}

    - name: Install Flutter
      uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # pin@v2.23.0
      with:
        flutter-version: ${{ inputs.flutter }}
        channel: stable
        cache: true

    - name: Setup Xcode
      run: sudo xcode-select --switch /Applications/Xcode_${{ inputs.xcode }}.app/Contents/Developer
      shell: bash

    - name: Enable Swift Package Manager
      run: flutter config --enable-swift-package-manager
      shell: bash

    - name: Install Flutter dependencies
      working-directory: auth0_flutter/example
      run: flutter pub get
      shell: bash

    - name: Save Xcode version
      run: xcodebuild -version | tee .xcode-version
      shell: bash

    - id: restore-pods-cache
      name: Restore Pods cache
      uses: actions/cache@v6
      with:
        path: auth0_flutter/example/${{ steps.lowercase-platform.outputs.platform }}/Pods
        key: pods-${{ hashFiles('Podfile.lock') }}-${{ hashFiles('.xcode-version') }}-v1

    - name: Install pods
      working-directory: auth0_flutter/example/${{ steps.lowercase-platform.outputs.platform }}
      run: pod install
      shell: bash

    - name: Fix iOS minimum deployment target for SPM
      if: inputs.platform == 'iOS'
      working-directory: auth0_flutter/example/ios/Flutter/ephemeral/Packages/FlutterGeneratedPluginSwiftPackage
      run: sed -i '' 's/\.iOS(".*")/\.iOS("14.0")/g' Package.swift
      shell: bash

    - name: Fix macOS minimum deployment target for SPM
      if: inputs.platform == 'macOS'
      working-directory: auth0_flutter/example/macos/Flutter/ephemeral/Packages/FlutterGeneratedPluginSwiftPackage
      run: sed -i '' 's/\.macOS(".*")/\.macOS("11.0")/g' Package.swift
      shell: bash


    - name: Set .env
      working-directory: auth0_flutter/example
      run: printf '%s\n%s\n%s' 'AUTH0_DOMAIN=${{ inputs.auth0-domain }}' 'AUTH0_CLIENT_ID=${{ inputs.auth0-client-id }}' 'AUTH0_CUSTOM_SCHEME=demo' >> .env
      shell: bash
