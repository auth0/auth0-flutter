name: Set up iOS/macOS environment
description: Set up the environment for building and testing the library on iOS/macOS

inputs:
  platform:
    description: Either iOS or macOS
    required: true

  ruby:
    description: The version of Ruby to use
    required: true

  flutter:
    description: The version of Flutter to use
    required: true

  xcode:
    description: The version of Xcode to use
    required: true

  auth0-domain:
    description: The Auth0 domain
    required: true

  auth0-client-id:
    description: The Auth0 client ID
    required: true

runs:
  using: composite

  steps:
    - name: Lowercase platform value
      id: lowercase-platform
      env:
        PLATFORM: ${{ inputs.platform }}
      run: echo "platform=$(echo "$PLATFORM" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
      shell: bash

    - name: Set up Ruby
      uses: ruby/setup-ruby@9eb537ca036ebaed86729dcb9309076e4c5c3b74 # pin@v1.314.0
      with:
        ruby-version: ${{ inputs.ruby }}
        bundler-cache: true
        cache-version: 1
        working-directory: auth0_flutter/example/${{ steps.lowercase-platform.outputs.platform }}

    - name: Install Flutter
      uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # pin@v2.23.0
      with:
        flutter-version: ${{ inputs.flutter }}
        channel: stable
        cache: true

    - name: Install Flutter dependencies
      working-directory: auth0_flutter/example
      run: flutter pub get
      shell: bash

    - name: Setup Xcode
      env:
        XCODE: ${{ inputs.xcode }}
      run: sudo xcode-select --switch "/Applications/Xcode_$XCODE.app/Contents/Developer"
      shell: bash

    - name: Save Xcode version
      run: xcodebuild -version | tee .xcode-version
      shell: bash

    - id: restore-pods-cache
      name: Restore Pods cache
      uses: actions/cache@v6
      with:
        path: auth0_flutter/example/${{ steps.lowercase-platform.outputs.platform }}/Pods
        key: pods-${{ hashFiles('Podfile.lock') }}-${{ hashFiles('.xcode-version') }}-v1

    - name: Install pods
      working-directory: auth0_flutter/example/${{ steps.lowercase-platform.outputs.platform }}
      run: pod install
      shell: bash

    - name: Set .env
      working-directory: auth0_flutter/example
      env:
        AUTH0_DOMAIN: ${{ inputs.auth0-domain }}
        AUTH0_CLIENT_ID: ${{ inputs.auth0-client-id }}
      run: printf 'AUTH0_DOMAIN=%s\nAUTH0_CLIENT_ID=%s\nAUTH0_CUSTOM_SCHEME=demo' "$AUTH0_DOMAIN" "$AUTH0_CLIENT_ID" >> .env
      shell: bash
